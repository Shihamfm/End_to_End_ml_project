
model_trainer:
  trained_model_file_path: "artifacts/best_model.skops"
  mlflow_experiment_name: "fraud_detection"
  mlflow_tracking_uri: "mlruns"
  n_iter_search: 10
  cv_folds: 3
  primary_metric: "pr_auc"
  random_state: 42

hyperparameters:
  random_forest:
    n_estimators: [200, 400]
    max_depth: [null, 10, 20]
    min_samples_leaf: [1, 2, 5]
    min_samples_split: [2, 5]
    class_weight: ["balanced"]
    max_features: ["sqrt"]
    n_jobs: [-1]

  xgboost:
    n_estimators: [300, 500]
    max_depth: [3, 5, 7]
    learning_rate: [0.05, 0.1]
    subsample: [0.8, 1.0]
    colsample_bytree: [0.8, 1.0]
    objective: ["binary:logistic"]
    eval_metric: ["aucpr"]
    n_jobs: [-1]

  lightgbm:
    n_estimators: [300, 500]
    learning_rate: [0.05, 0.1]
    num_leaves: [31, 63, 127]
    max_depth: [-1, 10, 20]
    min_child_samples: [20, 50]
    subsample: [0.8, 1.0]
    colsample_bytree: [0.8, 1.0]
    class_weight: ["balanced"]
    objective: ["binary"]
    metric: ["aucpr"]
    n_jobs: [-1]
    verbose: [-1]

REQUIRED_INPUT_COLUMNS : ['Time', 'V1', 'V2', 'V3', 'V4', 'V5', 'V6', 'V7', 'V8', 'V9', 'V10', 'V11', 'V12', 'V13', 'V14', 'V15', 'V16', 'V17', 'V18', 'V19', 'V20',
       'V21', 'V22', 'V23', 'V24', 'V25', 'V26', 'V27', 'V28', 'Amount']
home_file_path : "templates/index.html"